<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ringside View</title>
  <style>
    *{box-sizing:border-box;}
    body{margin:0;background:#fbf7ef;color:#1f2933;font-family:Georgia,'Times New Roman',serif;}
    .validation-bar{position:sticky;top:0;z-index:9999;background:linear-gradient(135deg,#111820,#263f5f);color:white;border-bottom:4px solid #b8872b;padding:12px 18px;display:flex;gap:12px;align-items:center;justify-content:center;flex-wrap:wrap;box-shadow:0 8px 28px rgba(0,0,0,.18);}
    .validation-bar span{font-size:.98rem;color:#f7ead7;}
    .validation-bar a{display:inline-block;text-decoration:none;border-radius:999px;padding:9px 14px;font-weight:bold;font-size:.92rem;letter-spacing:.02em;}
    .validation-bar a.primary{background:#fffdf8;color:#17202a;}
    .validation-bar a.secondary{border:1px solid rgba(255,255,255,.35);color:white;}
    iframe{display:block;width:100%;height:calc(100vh - 62px);border:0;background:#fbf7ef;}
    @media(max-width:700px){.validation-bar{justify-content:flex-start}.validation-bar span{width:100%;}iframe{height:calc(100vh - 110px);}}
  </style>
</head>
<body>
  <nav class="validation-bar" aria-label="Ringside View navigation">
    <span>Ringside View now includes a validation layer for statistically minded readers.</span>
    <a class="primary" href="rigor-and-validation.html">Rigor and validation</a>
    <a class="secondary" href="Ringside_View_backup.html">Open original view</a>
  </nav>
  <iframe src="Ringside_View_backup.html" title="Ringside View original content"></iframe>
</body>
</html>
